[workspace]
name = "astro-hologram"
version = "0.1.0"
description = "Astronomical image processing pipeline: plate solve → 3D reconstruction → Looking Glass visualization"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = ">=3.11"
jupyter = "*"
ipykernel = "*"
numpy = "*"
pillow = "*"
requests = "*"
astropy = "*"
matplotlib = "*"
python-dotenv = "*"
sep = "*"
pandas = "*"
pyqt = ">=5.15.11,<6"
astroquery = ">=0.4.11,<0.5"

[tasks]
register-kernel = "python -m ipykernel install --user --name astro-hologram --display-name 'Astro Hologram'"
notebook = "jupyter notebook"
lab = "jupyter lab"
